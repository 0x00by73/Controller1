name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: python -m unittest discover -s tests -v
      - name: Vendor Linux backend dependencies
        run: python -m pip install --requirement backend/requirements.lock --target py_modules
      - name: Verify vendored dependencies
        run: PYTHONPATH=py_modules python -c "import evdev, pyudev"
      - name: Package plugin
        run: |
          mkdir -p out/Controller1
          cp -R dist backend py_modules main.py plugin.json package.json README.md LICENSE out/Controller1/
          cd out && zip -r Controller1.zip Controller1
      - uses: actions/upload-artifact@v4
        with:
          name: Controller1
          path: out/Controller1.zip
