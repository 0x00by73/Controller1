name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Vendor Linux backend dependencies
        run: python -m pip install --requirement backend/requirements.lock --target py_modules
      - name: Package plugin
        run: |
          mkdir -p out/Controller1
          cp -R dist backend py_modules main.py plugin.json package.json README.md LICENSE out/Controller1/
          rm -f out/Controller1/dist/index.js.map
          find out/Controller1 -type d -name __pycache__ -exec rm -rf {} +
          rm -f out/Controller1/backend/Dockerfile out/Controller1/backend/Makefile out/Controller1/backend/entrypoint.sh
          cd out && zip -r Controller1.zip Controller1
      - name: Verify Decky zip layout
        run: |
          unzip -l out/Controller1.zip | tee /tmp/zip-listing.txt
          for required in Controller1/plugin.json Controller1/package.json Controller1/LICENSE Controller1/main.py Controller1/dist/index.js; do
            grep -q "$required" /tmp/zip-listing.txt || { echo "Missing $required"; exit 1; }
          done
      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="v$(node -p "require('./package.json').version")"
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" out/Controller1.zip --clobber
            else
              gh release create "$TAG" out/Controller1.zip --title "$TAG" --notes "Controller1 Decky plugin release"
            fi
          else
            gh release upload "$TAG" out/Controller1.zip --clobber
          fi
